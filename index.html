<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kokurikulum Merit Calculator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: none;
      margin: 0;
      line-height: 1.6;
      background: linear-gradient(135deg, #90b2d8, #e9f8ff);
      color: #03045E;
      min-height: 100vh;
      padding: 40px 20px;
      position: relative;
    }
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: 
        url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise"/></filter><rect width="100" height="100" fill="%23000" filter="url(%23noise)" opacity="0.02"/></svg>');
      pointer-events: none;
      z-index: 1;
    }
    .container {
      position: relative;
      z-index: 2;
    }
    label {
      display: block;
      margin-top: 1rem;
      font-weight: bold;
      color: #03045E;
    }
    select, input[type=number] {
      width: 100%;
      padding: 0.4rem;
      margin-top: 0.3rem;
      box-sizing: border-box;
      border-radius: 8px;
    }
    h1 {
      margin-top: 0;
      margin-bottom: 0.5rem;
      font-size: 2.5rem;
      color: #03045E;
      border-bottom: 3px solid #03045E;
      padding-bottom: 0.5rem;
    }
    .input-card {
      background: white;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.08);
      margin: 0 auto 2rem auto;
      max-width: 600px;
    }
    button {
      margin-top: 1rem;
      padding: 0.6rem 1rem;
      font-size: 1rem;
      border-radius: 8px;
    }
    #result {
      margin: 0 auto;
      max-width: 600px;
      margin-top: 1rem;
      font-weight: bold;
      color: #03045E;
      line-height: 2;
      background: white;
      padding: 1.5rem;
      border-radius: 12px;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.08);
    }
    .result-box {
      display: inline-block;
      border: 2px solid #03045E;
      border-radius: 8px;
      padding: 0.4rem 0.8rem;
      margin: 0.3rem 0;
      background-color: rgba(255, 255, 255, 0.5);
      font-size: 0.85rem;
    }
    .final-score-box {
      display: block;
      padding: 1rem 0;
      margin-top: 0;
      margin-bottom: 1.5rem;
      color: #03045E;
      font-size: 3.5rem;
      font-weight: bold;
      text-align: center;
      width: 100%;
      box-sizing: border-box;
    }
    .final-score-label {
      font-size: 1.5rem;
      margin: 0;
      line-height: 1.2;
    }
    .breakdown-container {
      margin-top: 0;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .breakdown-row {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .breakdown-row.full {
      width: 100%;
    }
    .breakdown-item {
      display: inline-block;
      border: 2px solid #03045E;
      border-radius: 8px;
      padding: 0.4rem 0.8rem;
      background-color: rgba(255, 255, 255, 0.5);
      font-size: 0.9rem;
      flex: 1;
      min-width: 120px;
      box-sizing: border-box;
    }
    .breakdown-item.total {
      font-size: 1.25rem;
      font-weight: bold;
      width: 100%;
    }
  </style>
</head>
<body>
  <div class="input-card">
    <h1>Kokurikulum Merit Calculator</h1>
  <p style="font-weight:bold; font-size:1.1rem; margin-top: 0.5rem; margin-bottom: 0.2rem;">Formula: total/110 x 10</p>
  <p style="font-weight:bold; font-size:0.9rem; margin-top: 0.2rem; margin-bottom: 1rem;">This calculator helps determine your Cocurriculum Merit Score based on attendance, participations, achievements, positions and bonus points.</p>

  <label for="kehadiran">Kehadiran (maksimum 30)</label>
  <input type="number" id="kehadiran" min="0" max="30" value="0" />

  <label for="penilaian">Penilaian Berterusan (maksimum 20)</label>
  <input type="number" id="penilaian" min="0" max="20" value="0" />

  <label for="penglibatan">Penglibatan (20%)</label>

  <select id="penglibatan">
    <option value="20">Antara Matrikulasi/Zon/Kebangsaan</option>
    <option value="19">Peringkat Kolej/Negeri</option>
    <option value="18">Antara Praktikum</option>
    <option value="17">Tutoran/Praktikum/Kolej Kediaman</option>
  </select>

  <label>Pencapaian (20%)</label>
  <div style="margin-top:0.2rem; margin-bottom:0.4rem; font-size:0.85rem; font-style:italic; color:#03045E;">Pilih satu pencapaian tertinggi SAHAJA</div>
  <select id="pencapaian_matrik">
    <option value="20">Antara Matrikulasi/Zon/Kebangsaan - Johan</option>
    <option value="19">Antara Matrikulasi/Zon/Kebangsaan - Naib Johan</option>
    <option value="18">Antara Matrikulasi/Zon/Kebangsaan - Ketiga</option>
    <option value="17">Antara Matrikulasi/Zon/Kebangsaan - Penyertaan</option>
    <option value="0">-</option>
  </select>
  <select id="pencapaian_kolej">
    <option value="17">Peringkat Kolej/Negeri - Johan</option>
    <option value="16">Peringkat Kolej/Negeri - Naib Johan</option>
    <option value="15">Peringkat Kolej/Negeri - Ketiga</option>
    <option value="14">Peringkat Kolej/Negeri - Penyertaan</option>
    <option value="0">-</option>
  </select>
  <select id="pencapaian_praktikum">
    <option value="14">Antara Praktikum - Johan</option>
    <option value="13">Antara Praktikum - Naib Johan</option>
    <option value="12">Antara Praktikum - Ketiga</option>
    <option value="11">Antara Praktikum - Penyertaan</option>
    <option value="0">-</option>
  </select>
  <select id="pencapaian_tutoran">
    <option value="11">Tutoran/Praktikum/Kolej Kediaman - Johan</option>
    <option value="10">Tutoran/Praktikum/Kolej Kediaman - Naib Johan</option>
    <option value="9">Tutoran/Praktikum/Kolej Kediaman - Ketiga</option>
    <option value="8">Tutoran/Praktikum/Kolej Kediaman - Penyertaan</option>
    <option value="0">-</option>
  </select>

  <label for="jawatan">Jawatan (10%)</label>
  <select id="jawatan">
    <option value="10">YDP/NYDP/Setiausaha Agong JPP/Bendahari JPP/Exco JPP / Imam</option>
    <option value="9">Pengerusi/Ketua Pasukan/Ketua dalam pelbagai aktiviti peringkat kolej</option>
    <option value="8">Timbalan Pengerusi/Setiausaha/Bendahari dalam pelbagai aktiviti</option>
    <option value="7">Ketua Biro-Biro JPP/Ahli Jawatankuasa dalam pelbagai aktiviti peringkat kolej</option>
    <option value="6">Ahli Jawatankuasa pelbagai program anjuran kolej</option>
    <option value="5">Ahli Biasa/Peserta program anjuran kolej</option>
  </select>

  <label for="bonus">Bonus (10%)</label>
  <select id="bonus">
    <option value="10">Anugerah Kecemerlangan Kokurikulum / YDP JPP / Mewakili(2) peringkat kebangsaan/antarabangsa</option>
    <option value="9">Terlibat sekurang-kurangnya (1) pertandingan atau aktiviti peringkat kebangsaan/antarabangsa atau sekurang-kurangnya (3) aktiviti kolej/jabatan</option>
    <option value="8">Terlibat sekurang-kurangnya (2) aktiviti dalam mana-mana kategori kokurikulum peringkat kolej/jabatan</option>
    <option value="7">Terlibat sekurang-kurangnya (1) aktiviti dalam mana-mana kategori kokurikulum peringkat kolej/jabatan</option>
  </select>

  <button id="calculate" onclick="kira()">Calculate</button>
  </div>
  <div id="result"></div>

  <script>
    function kira() {
      const kehadiran = Number(document.getElementById('kehadiran').value);
      const penilaian = Number(document.getElementById('penilaian').value);
      const penglibatan = Number(document.getElementById('penglibatan').value);
      // for pencapaian we take the highest of the four selects
      const pencapaianValues = [
        Number(document.getElementById('pencapaian_matrik').value),
        Number(document.getElementById('pencapaian_kolej').value),
        Number(document.getElementById('pencapaian_praktikum').value),
        Number(document.getElementById('pencapaian_tutoran').value)
      ];
      const pencapaian = Math.max(...pencapaianValues);
      const jawatan = Number(document.getElementById('jawatan').value);
      const bonus = Number(document.getElementById('bonus').value);

      // subtotal (without bonus) has a maximum of 100
      const subtotal =
        kehadiran +
        penilaian +
        penglibatan +
        pencapaian +
        jawatan;

      // rawTotal can reach 110 (subtotal 100 + bonus 10)
      const rawTotal = subtotal + bonus;

      // Merit score remains out of 10.
      // If raw total reaches 100 or more, merit is automatically 10.
      const meritScore = rawTotal >= 100 ? 10 : Math.min((rawTotal / 110) * 10, 10);

      const breakdown = `<div class="final-score-box">
        <div class="final-score-label">Total (including bonus)</div>
        <div>${meritScore.toFixed(2)}/10</div>
      </div>
      <div class="breakdown-container">
        <div class="breakdown-row">
          <div class="breakdown-item">• Kehadiran: ${kehadiran}/30</div>
          <div class="breakdown-item">• Penilaian Berterusan: ${penilaian}/20</div>
          <div class="breakdown-item">• Penglibatan: ${penglibatan}/20</div>
        </div>
        <div class="breakdown-row">
          <div class="breakdown-item">• Pencapaian: ${pencapaian}/20</div>
          <div class="breakdown-item">• Jawatan: ${jawatan}/10</div>
          <div class="breakdown-item">• Bonus: ${bonus}/10</div>
        </div>
      </div>`;

      const totalScore = `<div class="breakdown-item total" style="margin-top:1rem;">• Total Score: ${rawTotal}/110</div>`;

      document.getElementById('result').innerHTML = breakdown + totalScore;
    }

    // Validate inputs and disable calculate button if any value exceeds max
    function validateInputs() {
      const kehadiran = Number(document.getElementById('kehadiran').value);
      const penilaian = Number(document.getElementById('penilaian').value);
      const calculateBtn = document.getElementById('calculate');

      // Check if values are within limits
      if (kehadiran > 30 || penilaian > 20) {
        calculateBtn.disabled = true;
      } else {
        calculateBtn.disabled = false;
      }
    }
    

    // Add event listeners to validate on input
    document.getElementById('kehadiran').addEventListener('input', validateInputs);
    document.getElementById('penilaian').addEventListener('input', validateInputs);

    // Initial validation
    validateInputs();
  </script>
</body>
</html>
